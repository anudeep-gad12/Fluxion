<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141417"/>
      <stop offset="0.55" stop-color="#09090b"/>
      <stop offset="1" stop-color="#020203"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f3f46"/>
      <stop offset="0.55" stop-color="#27272a"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="72" y="72" width="880" height="880" rx="204" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="96" y="96" width="832" height="832" rx="180" fill="none" stroke="url(#stroke)" stroke-width="18"/>
  <path d="M226 272L798 752" stroke="#172554" stroke-width="34" opacity="0.26"/>
  <path d="M786 242L270 792" stroke="#083344" stroke-width="28" opacity="0.22"/>
  <g filter="url(#softGlow)" opacity="0.55">
    <path d="M224 632C318 514 416 498 512 560C608 622 706 606 800 488" fill="none" stroke="#38bdf8" stroke-width="22" stroke-linecap="round"/>
  </g>
  <text x="512" y="600"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="292"
        font-weight="800"
        letter-spacing="-32"
        fill="#f4f4f5"
        text-anchor="middle">~&gt;</text>
  <text x="512" y="600"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="292"
        font-weight="800"
        letter-spacing="-32"
        fill="none"
        stroke="#67e8f9"
        stroke-width="5"
        stroke-opacity="0.2"
        text-anchor="middle">~&gt;</text>
</svg>

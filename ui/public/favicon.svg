<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#4F46E5"/>

  <!-- Neural network nodes -->
  <circle cx="50" cy="30" r="8" fill="#E0E7FF" opacity="0.9"/>
  <circle cx="30" cy="55" r="7" fill="#E0E7FF" opacity="0.9"/>
  <circle cx="50" cy="55" r="9" fill="#FFF" opacity="1"/>
  <circle cx="70" cy="55" r="7" fill="#E0E7FF" opacity="0.9"/>
  <circle cx="40" cy="75" r="6" fill="#E0E7FF" opacity="0.8"/>
  <circle cx="60" cy="75" r="6" fill="#E0E7FF" opacity="0.8"/>

  <!-- Connections -->
  <line x1="50" y1="30" x2="30" y2="55" stroke="#C7D2FE" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="30" x2="50" y2="55" stroke="#FFF" stroke-width="3" opacity="0.8"/>
  <line x1="50" y1="30" x2="70" y2="55" stroke="#C7D2FE" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="55" x2="40" y2="75" stroke="#C7D2FE" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="55" x2="40" y2="75" stroke="#E0E7FF" stroke-width="2.5" opacity="0.7"/>
  <line x1="50" y1="55" x2="60" y2="75" stroke="#E0E7FF" stroke-width="2.5" opacity="0.7"/>
  <line x1="70" y1="55" x2="60" y2="75" stroke="#C7D2FE" stroke-width="2" opacity="0.5"/>

  <!-- Center glow effect -->
  <circle cx="50" cy="55" r="12" fill="none" stroke="#FFF" stroke-width="1" opacity="0.3"/>
</svg>

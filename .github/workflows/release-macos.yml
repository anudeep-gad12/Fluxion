name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  macos-release:
    name: Build signed Fluxion macOS app
    runs-on: macos-15

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      FLUXION_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Patch Sparkle public key
        if: env.FLUXION_SPARKLE_PUBLIC_ED_KEY != ''
        run: ./scripts/patch_sparkle_public_key.sh "$FLUXION_SPARKLE_PUBLIC_ED_KEY"

      - name: Import signing certificate
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\"]//g' | tr -d '\n')

          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=Developer ID Application" >> "$GITHUB_ENV"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Tauri app (unsigned bundle)
        env:
          FLUXION_APP_VERSION: ${{ steps.version.outputs.marketing_version }}
          FLUXION_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          FLUXION_BUILD_ID: ${{ github.sha }}
          SPARKLE_FRAMEWORK_PATH: ${{ github.workspace }}/src-tauri/Frameworks
        run: ./scripts/build_macos_tauri.sh

      - name: Locate app bundle
        id: app_path
        run: |
          set -euo pipefail
          APP="dist/macos/Fluxion.app"
          if [ ! -d "$APP" ]; then
            echo "::error::Missing $APP"
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Sign PyInstaller sidecar
        run: |
          set -euo pipefail
          APP="${{ steps.app_path.outputs.app }}"
          SIGN=(codesign --force --options runtime --timestamp --sign "Developer ID Application")
          SIDECAR="$(find "$APP/Contents" -name fluxion-server -type f | head -n 1)"
          if [ -z "$SIDECAR" ]; then
            echo "::error::fluxion-server sidecar not found in bundle"
            exit 1
          fi
          "${SIGN[@]}" --entitlements src-tauri/entitlements.plist "$SIDECAR"

      - name: Sign app and Sparkle helpers
        run: |
          set -euo pipefail
          APP="${{ steps.app_path.outputs.app }}"
          SPARKLE_FW="$APP/Contents/Frameworks/Sparkle.framework"
          SIGN=(codesign --force --options runtime --timestamp --sign "Developer ID Application")

          if [ -d "$SPARKLE_FW" ]; then
            "${SIGN[@]}" "$SPARKLE_FW/Versions/B/XPCServices/Downloader.xpc"
            "${SIGN[@]}" "$SPARKLE_FW/Versions/B/XPCServices/Installer.xpc"
            "${SIGN[@]}" "$SPARKLE_FW/Versions/B/Updater.app"
            "${SIGN[@]}" "$SPARKLE_FW/Versions/B/Autoupdate"
            "${SIGN[@]}" "$SPARKLE_FW"
          fi

          "${SIGN[@]}" --entitlements src-tauri/entitlements.plist "$APP"

      - name: Verify signature
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "${{ steps.app_path.outputs.app }}"

      - name: Submit to Apple notarization
        id: notarize
        run: |
          set -euo pipefail
          APP="${{ steps.app_path.outputs.app }}"
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize-payload.zip"
          SUBMIT_OUTPUT="$RUNNER_TEMP/notarize-submit.txt"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --output-format json \
            | tee "$SUBMIT_OUTPUT"

          SUBMISSION_ID="$(jq -r .id "$SUBMIT_OUTPUT")"
          STATUS="$(jq -r .status "$SUBMIT_OUTPUT")"

          echo "submission_id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization returned status '$STATUS'"
            exit 1
          fi

      - name: Fetch notarization log on failure
        if: failure() && steps.notarize.outputs.submission_id != ''
        run: |
          set -euo pipefail
          xcrun notarytool log "${{ steps.notarize.outputs.submission_id }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Staple notarization ticket
        run: |
          set -euo pipefail
          APP="${{ steps.app_path.outputs.app }}"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Gatekeeper assessment
        run: |
          set -euo pipefail
          spctl --assess --type execute --verbose=4 "${{ steps.app_path.outputs.app }}"

      - name: Package release zip
        run: |
          set -euo pipefail
          rm -f dist/macos/Fluxion-macos-arm64.zip
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ steps.app_path.outputs.app }}" \
            dist/macos/Fluxion-macos-arm64.zip

      - name: Create DMG
        run: |
          set -euo pipefail
          brew install create-dmg
          APP="${{ steps.app_path.outputs.app }}"
          DMG="dist/macos/Fluxion-macos-arm64.dmg"
          rm -f "$DMG"
          create-dmg \
            --volname "Fluxion" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Fluxion.app" 180 190 \
            --hide-extension "Fluxion.app" \
            --app-drop-link 480 190 \
            --no-internet-enable \
            "$DMG" \
            "$APP"

      - name: Sign update with Sparkle EdDSA
        id: sign_update
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          SPARKLE_VERSION="2.9.2"
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

          SIGN_UPDATE="$RUNNER_TEMP/sparkle/bin/sign_update"
          ZIP_PATH="dist/macos/Fluxion-macos-arm64.zip"

          SIGNATURE_LINE="$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP_PATH")"
          ED_SIGNATURE="$(printf '%s' "$SIGNATURE_LINE" | sed -nE 's/.*sparkle:edSignature="([^"]+)".*/\1/p')"
          LENGTH="$(printf '%s' "$SIGNATURE_LINE" | sed -nE 's/.*length="([^"]+)".*/\1/p')"

          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse sign_update output: $SIGNATURE_LINE"
            exit 1
          fi

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Generate appcast.xml
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.marketing_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          ED_SIGNATURE: ${{ steps.sign_update.outputs.ed_signature }}
          LENGTH: ${{ steps.sign_update.outputs.length }}
          DOWNLOAD_URL: https://github.com/anudeep-gad12/Fluxion/releases/download/${{ github.ref_name }}/Fluxion-macos-arm64.zip
        run: |
          set -euo pipefail
          export PUB_DATE="$(date -u +"%a, %d %b %Y %H:%M:%S +0000")"
          mkdir -p dist/macos
          python3 <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          build_number = os.environ["BUILD_NUMBER"]
          ed_signature = os.environ["ED_SIGNATURE"]
          length = os.environ["LENGTH"]
          download_url = os.environ["DOWNLOAD_URL"]
          pub_date = os.environ["PUB_DATE"]

          appcast = (
              '<?xml version="1.0" standalone="yes"?>\n'
              '<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">\n'
              '  <channel>\n'
              '    <title>Fluxion</title>\n'
              '    <link>https://github.com/anudeep-gad12/Fluxion</link>\n'
              '    <description>Fluxion release feed</description>\n'
              '    <language>en</language>\n'
              '    <item>\n'
              f'      <title>v{version}</title>\n'
              f'      <pubDate>{pub_date}</pubDate>\n'
              f'      <sparkle:version>{build_number}</sparkle:version>\n'
              f'      <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n'
              '      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>\n'
              '      <enclosure\n'
              f'        url="{download_url}"\n'
              f'        sparkle:edSignature="{ed_signature}"\n'
              f'        length="{length}"\n'
              '        type="application/octet-stream" />\n'
              '    </item>\n'
              '  </channel>\n'
              '</rss>\n'
          )

          Path("dist/macos/appcast.xml").write_text(appcast)
          print(appcast)
          PY

      - name: Write SHA256SUMS
        run: |
          set -euo pipefail
          cd dist/macos
          shasum -a 256 Fluxion-macos-arm64.zip Fluxion-macos-arm64.dmg > SHA256SUMS

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: fluxion-macos
          path: |
            dist/macos/Fluxion-macos-arm64.zip
            dist/macos/Fluxion-macos-arm64.dmg
            dist/macos/appcast.xml
            dist/macos/SHA256SUMS

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/Fluxion-macos-arm64.dmg
            dist/macos/Fluxion-macos-arm64.zip
            dist/macos/appcast.xml
            dist/macos/SHA256SUMS
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}

      - name: Publish appcast to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        run: mkdir -p pages && cp dist/macos/appcast.xml pages/appcast.xml

      - name: Deploy appcast feed
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          keep_files: false

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/') && steps.version.outputs.is_prerelease == 'false'
        env:
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          TAP_REPO: anudeep-gad12/homebrew-tap
        run: |
          if [ -z "$HOMEBREW_TAP_SSH_KEY" ]; then
            echo "::notice::Skipping Homebrew tap update because HOMEBREW_TAP_SSH_KEY is not configured."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 dist/macos/Fluxion-macos-arm64.zip | awk '{print $1}')"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_SSH_KEY" > ~/.ssh/homebrew_tap
          chmod 600 ~/.ssh/homebrew_tap
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/homebrew_tap -o IdentitiesOnly=yes"

          git clone "git@github.com:${TAP_REPO}.git" homebrew-tap
          cd homebrew-tap
          ruby -0pi -e "gsub(/version \"[^\"]+\"/, \"version \\\"${VERSION}\\\"\"); gsub(/sha256 \"[a-f0-9]+\"/, \"sha256 \\\"${SHA256}\\\"\")" Casks/fluxion.rb

          if git diff --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi

          git add Casks/fluxion.rb
          git commit -m "Update Fluxion cask to v${VERSION}"
          git push

# Chat Configuration - Single Source of Truth
# 
# All runtime settings are controlled here.
# Changes require a server restart to take effect.

model:
  name: "ministral-14b-reasoning"  # Reasoning model with native [THINK] tags
  temperature: 1.0  # Recommended for reasoning models
  max_tokens: 4096
  seed: null  # Set to an integer for reproducible outputs (e.g., 42)
  top_p: null
  frequency_penalty: null
  presence_penalty: null

context:
  max_messages: 50        # Maximum conversation turns to keep
  max_tokens: 6000        # Token budget for conversation history
  reserve_for_response: 2048  # Tokens reserved for model response
  truncation_strategy: "sliding_window"  # sliding_window or oldest_first

system_prompt: |
  You are a helpful AI assistant. Answer directly and clearly.

# Model endpoint (Ollama)
endpoint: "http://127.0.0.1:11434"

# Tracing configuration
tracing:
  enabled: true
  log_level: "debug"  # debug, info, warn
  log_model_calls: true

# Thinking/Reasoning configuration
thinking:
  default_strategy: "car"  # car (default), cot (thinking), direct

  # CAR (Certainty-based Adaptive Routing) settings
  car:
    ppl_threshold: 5.0       # Below = direct answer, above = CoT reasoning
    max_short_tokens: 100    # Max tokens for short answer probe
    thinking_budget: 512     # Max tokens for thinking phase (when escalating)
    answer_budget: 256       # Max tokens for answer phase (when escalating)

  # Chain-of-Thought settings (two-phase: thinking then answer)
  cot:
    enabled: true
    trigger_phrase: "Let's think step by step."
    thinking_budget: 512  # Max tokens for thinking phase
    answer_budget: 256    # Max tokens for answer phase

  # Tracing settings for thinking
  tracing:
    save_internal: true      # Save full raw traces
    save_user_summary: true  # Save humane summaries

  # UI display settings
  ui:
    show_thinking: false    # Hidden by default
    collapsible: true       # Allow expansion

# Chat Configuration - Single Source of Truth
#
# All runtime settings are controlled here.
# Changes require a server restart to take effect.
#
# Environment variable syntax:
#   ${VAR}           - Required, errors if not set
#   ${VAR:-default}  - Optional with default value

# =============================================================================
# Provider Configuration
# =============================================================================
# All providers are OpenAI-compatible - same code works with:
# LM Studio, vLLM, Ollama, OpenAI, Azure OpenAI, etc.

provider:
  # Base URL - supports env vars for deployment flexibility
  base_url: ${LLM_BASE_URL:-http://127.0.0.1:1234}

  # API key - use env var for secrets (empty = no auth for local servers)
  api_key: ${LLM_API_KEY:-}

  # Endpoint selection: responses | chat_completions | auto
  # - responses: Primary endpoint for agents/tool use (recommended)
  # - chat_completions: Fallback for compatibility
  # - auto: Probe and cache result
  endpoint: "responses"

  # If /v1/responses returns 404/405, try /v1/chat/completions
  fallback_on_404: true
  # Note: Tool fallback policy is model-based:
  #   - gpt-oss models: REQUIRE /v1/responses for tools (hard fail if unavailable)
  #   - Other models: Allow chat_completions + tools

  # Reliability - exponential backoff with jitter
  timeout: 120.0
  max_retries: 3
  base_delay: 1.0       # Initial delay for exponential backoff
  max_delay: 30.0       # Cap for backoff
  retryable_statuses: [429, 500, 502, 503, 504]

  # Extra headers (e.g., api-version for Azure)
  extra_headers: {}

# =============================================================================
# Provider Chain Configuration (Optional)
# =============================================================================
# When enabled, overrides single provider mode with failover chain.
# Each provider has its own circuit breaker for independent health tracking.
#
# Failover Strategy:
#   Request -> DeepInfra (primary)
#     -> if 5xx or timeout: Together AI (fallback)
#     -> if also fails: Error with retry option

provider_chain:
  enabled: false  # Set to true to enable chain mode

  # Default circuit breaker settings (used if not specified per-provider)
  default_circuit_breaker:
    failure_threshold: 5        # Failures before opening circuit
    recovery_timeout_seconds: 30.0  # Seconds before half-open test
    success_threshold: 2        # Successes in half-open before closing

  # Providers in priority order (lower priority = tried first)
  providers:
    - name: deepinfra
      priority: 0  # Primary (tried first)
      provider:
        base_url: "https://api.deepinfra.com/v1/openai"
        api_key: ${DEEPINFRA_API_KEY:-}
        endpoint: "chat_completions"
        timeout: 60.0
        max_retries: 2
        retryable_statuses: [429, 500, 502, 503, 504]
      circuit_breaker:
        failure_threshold: 5
        recovery_timeout_seconds: 30.0

    - name: together_ai
      priority: 1  # Fallback
      provider:
        base_url: "https://api.together.xyz/v1"
        api_key: ${TOGETHER_API_KEY:-}
        endpoint: "chat_completions"
        timeout: 60.0
        max_retries: 2
        retryable_statuses: [429, 500, 502, 503, 504]
      circuit_breaker:
        failure_threshold: 5
        recovery_timeout_seconds: 30.0

# =============================================================================
# Model Configuration
# =============================================================================

model:
  name: "openai/gpt-oss-120b"  # Model name as expected by the provider
  temperature: 1.0            # Recommended for reasoning models
  max_tokens: 4096
  seed: null                  # Set to integer for reproducible outputs
  top_p: null
  frequency_penalty: null
  presence_penalty: null
  # Native reasoning effort for gpt-oss models (low, medium, high)
  # Higher = deeper reasoning, more tokens, better for complex tasks
  reasoning_effort: "medium"

# =============================================================================
# Context Management
# =============================================================================

context:
  max_messages: 50            # Maximum conversation turns to keep
  max_tokens: 6000            # Token budget for conversation history
  reserve_for_response: 2048  # Tokens reserved for model response
  truncation_strategy: "sliding_window"  # sliding_window | oldest_first

# =============================================================================
# System Prompt
# =============================================================================

system_prompt: |
  You are a helpful AI assistant. Answer directly and clearly.

# =============================================================================
# Tracing & Observability
# =============================================================================

tracing:
  enabled: true
  log_level: "debug"      # debug | info | warn
  log_model_calls: true

# =============================================================================
# Thinking/Reasoning Strategies
# =============================================================================

thinking:
  # Mode to strategy mapping (UI mode -> strategy name)
  # gpt-oss models have native reasoning via reasoning_effort parameter
  mode_mapping:
    default: "direct"     # Uses model's native reasoning
    thinking: "direct"    # gpt-oss has native reasoning via reasoning_effort

  # Tracing settings for thinking
  tracing:
    save_internal: true       # Save full raw traces
    save_user_summary: true   # Save humane summaries

  # UI display settings
  ui:
    show_thinking: false      # Hidden by default
    collapsible: true         # Allow expansion

# =============================================================================
# Parallel.ai Configuration (Web Search & Extract)
# =============================================================================
# Used by web_search and web_extract tools for web research.
# Get API key from: https://parallel.ai

parallel:
  base_url: "https://api.parallel.ai/v1beta"
  api_key: ${PARALLEL_API_KEY:-}

  search:
    max_results: 10
    timeout_ms: 15000

  extract:
    timeout_ms: 30000
    max_urls_per_request: 5

# =============================================================================
# Sandbox Configuration (E2B)
# =============================================================================
# Used by python_execute tool for secure code execution.
# Get API key from: https://e2b.dev

sandbox:
  provider: e2b

  e2b:
    api_key: ${E2B_API_KEY:-}
    template: "code-interpreter"  # Must use code-interpreter, not "base" (port 49999 issue)
    timeout_seconds: 30
    cleanup_on_startup: true      # Clean zombie sessions on startup
    stale_session_minutes: 10     # Age threshold for stale sessions
    metadata:
      app: "reasoner"

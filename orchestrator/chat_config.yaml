# Chat Configuration - Single Source of Truth
#
# All runtime settings are controlled here.
# Changes require a server restart to take effect.
#
# Environment variable syntax:
#   ${VAR}           - Required, errors if not set
#   ${VAR:-default}  - Optional with default value

# =============================================================================
# Provider Configuration
# =============================================================================
# All providers are OpenAI-compatible - same code works with:
# vLLM, Ollama, OpenAI, Azure OpenAI, DeepInfra, etc.

provider:
  # Base URL - supports env vars for deployment flexibility
  # DeepInfra (cloud): https://api.deepinfra.com/v1/openai
  # llama-server (local): http://localhost:8080/v1
  # Note: For DeepInfra, code appends /chat/completions.
  base_url: ${LLM_BASE_URL:-https://api.deepinfra.com/v1/openai}

  # API key - use env var for secrets (empty = no auth for local servers)
  # Set LLM_API_KEY to your provider's key (OpenAI, DeepInfra, etc.)
  api_key: ${LLM_API_KEY:-}

  # Endpoint selection: responses | chat_completions | auto
  # - chat_completions: Standard OpenAI format (recommended for llama-server, DeepInfra)
  # - responses: Custom format (gpt-oss models only)
  # - auto: Probe and cache result
  # Set via: ./dev.sh provider [local|deepinfra]
  endpoint: ${LLM_ENDPOINT:-chat_completions}

  # If /v1/responses returns 404/405, try /v1/chat/completions
  fallback_on_404: true
  # Note: Tool fallback policy is model-based:
  #   - gpt-oss models: REQUIRE /v1/responses for tools (hard fail if unavailable)
  #   - Other models: Allow chat_completions + tools

  # Reliability - exponential backoff with jitter
  timeout: 120.0
  slow_response_threshold: 15.0  # Seconds before showing "taking longer than usual" message
  max_retries: 3
  base_delay: 1.0       # Initial delay for exponential backoff
  max_delay: 30.0       # Cap for backoff
  retryable_statuses: [429, 500, 502, 503, 504]

  # Extra headers (e.g., api-version for Azure)
  extra_headers: {}

# =============================================================================
# Provider Chain Configuration (Optional)
# =============================================================================
# When enabled, overrides single provider mode with failover chain.
# Each provider has its own circuit breaker for independent health tracking.
#
# Failover Strategy:
#   Request -> DeepInfra (primary)
#     -> if 5xx or timeout: Together AI (fallback)
#     -> if also fails: Error with retry option

provider_chain:
  enabled: false  # Set to true to enable chain mode

  # Default circuit breaker settings (used if not specified per-provider)
  default_circuit_breaker:
    failure_threshold: 5        # Failures before opening circuit
    recovery_timeout_seconds: 30.0  # Seconds before half-open test
    success_threshold: 2        # Successes in half-open before closing

  # Providers in priority order (lower priority = tried first)
  providers:
    - name: deepinfra
      priority: 0  # Primary (tried first)
      provider:
        base_url: "https://api.deepinfra.com/v1/openai"
        api_key: ${DEEPINFRA_API_KEY:-}
        endpoint: "chat_completions"
        timeout: 60.0
        max_retries: 2
        retryable_statuses: [429, 500, 502, 503, 504]
      circuit_breaker:
        failure_threshold: 5
        recovery_timeout_seconds: 30.0

    - name: together_ai
      priority: 1  # Fallback
      provider:
        base_url: "https://api.together.xyz/v1"
        api_key: ${TOGETHER_API_KEY:-}
        endpoint: "chat_completions"
        timeout: 60.0
        max_retries: 2
        retryable_statuses: [429, 500, 502, 503, 504]
      circuit_breaker:
        failure_threshold: 5
        recovery_timeout_seconds: 30.0

# =============================================================================
# Model Configuration
# =============================================================================

model:
  # Model name - override via LLM_MODEL env var for different providers
  # DeepInfra: openai/gpt-oss-120b (supports reasoning_effort)
  # llama-server local: gpt-oss-20b (or whatever you're serving)
  name: ${LLM_MODEL:-openai/gpt-oss-120b}
  temperature: 1.0            # Required: 1.0 for reasoning models (gpt-oss, gpt-5-mini, o1, o3)
  max_tokens: 4096
  seed: null                  # Set to integer for reproducible outputs
  top_p: null
  frequency_penalty: null
  presence_penalty: null
  # Native reasoning effort for gpt-oss models (low, medium, high)
  # Higher = deeper reasoning, more tokens, better for complex tasks
  # Note: Only works with gpt-oss models on DeepInfra
  reasoning_effort: "medium"

# =============================================================================
# Context Management
# =============================================================================

context:
  max_messages: 50            # Maximum conversation turns to keep
  max_tokens: 100000           # Token budget for conversation history (model has 128k)
  reserve_for_response: 4096  # Tokens reserved for model response
  truncation_strategy: "sliding_window"  # sliding_window | oldest_first

# =============================================================================
# System Prompt
# =============================================================================

system_prompt: |
  You are a helpful AI assistant. Answer directly and clearly.
  Be warm, friendly, and engaging. Show genuine enthusiasm when helping users.

# =============================================================================
# Tracing & Observability
# =============================================================================

tracing:
  enabled: true
  log_level: "debug"      # debug | info | warn
  log_model_calls: true

# =============================================================================
# Thinking/Reasoning Strategies
# =============================================================================

thinking:
  # Mode to strategy mapping (UI mode -> strategy name)
  # gpt-oss models have native reasoning via reasoning_effort parameter
  mode_mapping:
    default: "direct"     # Uses model's native reasoning
    thinking: "direct"    # gpt-oss has native reasoning via reasoning_effort

  # Tracing settings for thinking
  tracing:
    save_internal: true       # Save full raw traces
    save_user_summary: true   # Save humane summaries

  # UI display settings
  ui:
    show_thinking: false      # Hidden by default
    collapsible: true         # Allow expansion

# =============================================================================
# Parallel.ai Configuration (Web Search & Extract)
# =============================================================================
# Used by web_search and web_extract tools for web research.
# Get API key from: https://parallel.ai

parallel:
  base_url: "https://api.parallel.ai/v1beta"
  api_key: ${PARALLEL_API_KEY:-}

  search:
    max_results: 10
    timeout_ms: 15000

  extract:
    timeout_ms: 30000
    max_urls_per_request: 5

# =============================================================================
# Python Execution
# =============================================================================
# Used by python_execute tool for calculations.
# Currently uses local subprocess (fast, reliable).

python:
  timeout_seconds: 30  # Execution timeout

# =============================================================================
# Query Classification (Tool Usage Policy)
# =============================================================================
# Controls when python_execute is required vs. optional for calculations.
# Uses keyword-based detection (not LLM-based).

query_classification:
  enabled: false  # Disabled - let the model decide when to use tools
  # CALCULATION_SYSTEM_PROMPT provides guidance without forcing tool_choice
  min_confidence_for_enforcement: 2

# =============================================================================
# Agent Planning
# =============================================================================
# Controls whether the agent creates an explicit plan before executing.
# The planner LLM naturally scales plan complexity based on query:
# - Simple queries: 1 step
# - Moderate research: 2-3 steps
# - Complex analysis: 3-5 steps

agent_planning:
  enabled: true           # Enable/disable planning step
  max_plan_steps: 5       # Maximum steps planner can create

# =============================================================================
# Demo Mode
# =============================================================================
# Settings for demo/showcase deployments.
# Enable to add rate limiting and sidebar restrictions.

demo:
  enabled: ${DEMO_MODE:-false}
  owner_secret: ${DEMO_OWNER_SECRET:-}  # Long random string for owner access via ?owner=<secret>
  rate_limit:
    max_agent_runs_per_hour: 10    # Agent runs are expensive (web search + multiple LLM calls)
    max_chat_runs_per_hour: 30     # Chat runs are cheaper (single LLM call)
    window_seconds: 3600           # 1 hour window
  whitelist_ips:                   # IPs that bypass rate limiting
    - "127.0.0.1"
    - "::1"

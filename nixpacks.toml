# Nixpacks configuration for Railway
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "gcc", "sqlite"]

[phases.build]
cmds = [
    "cd ui && npm install && npm run build",
    "pip install uv && uv sync --no-dev"
]

[start]
cmd = "uv run uvicorn orchestrator.app:app --host 0.0.0.0 --port ${PORT:-8080}"

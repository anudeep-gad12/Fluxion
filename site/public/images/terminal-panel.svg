<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Integrated terminal illustration">
  <rect width="720" height="360" rx="14" fill="#09090b" stroke="rgba(255,255,255,0.08)"/>
  <rect x="0" y="0" width="720" height="44" fill="#0c0c0e"/>
  <text x="20" y="28" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Terminal</text>
  <rect x="20" y="52" width="100" height="24" rx="6" fill="rgba(121,230,255,0.15)"/>
  <text x="32" y="68" font-family="ui-monospace,monospace" font-size="11" fill="#79e6ff">zsh 1</text>
  <rect x="128" y="52" width="72" height="24" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="140" y="68" font-family="ui-monospace,monospace" font-size="11" fill="#71717a">zsh 2</text>
  <text x="660" y="68" font-family="system-ui,sans-serif" font-size="18" fill="#71717a" text-anchor="end">+</text>
  <rect x="16" y="88" width="688" height="256" rx="10" fill="#050608"/>
  <text x="32" y="120" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">~/Projects/my-app</text>
  <text x="32" y="148" font-family="ui-monospace,monospace" font-size="12" fill="#a1a1aa">$ uv run pytest -q</text>
  <text x="32" y="176" font-family="ui-monospace,monospace" font-size="12" fill="#71717a">..........</text>
  <text x="32" y="204" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">10 passed</text>
  <text x="32" y="240" font-family="ui-monospace,monospace" font-size="12" fill="#79e6ff">$ _</text>
</svg>

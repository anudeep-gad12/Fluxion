<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Fluxion desktop app illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141417"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="20" fill="#0c0c0e" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>

  <!-- Sidebar -->
  <rect x="40" y="40" width="220" height="640" fill="#09090b"/>
  <rect x="259" y="40" width="1" height="640" fill="rgba(255,255,255,0.06)"/>
  <rect x="72" y="72" width="36" height="36" rx="8" fill="url(#iconBg)" stroke="rgba(255,255,255,0.1)"/>
  <text x="90" y="97" font-family="ui-monospace,monospace" font-size="16" font-weight="700" fill="#f4f4f5" text-anchor="middle">~&gt;</text>
  <text x="120" y="97" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#f4f4f5">Fluxion</text>
  <text x="72" y="140" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#71717a" letter-spacing="0.08em">WORKSPACES</text>
  <rect x="64" y="158" width="172" height="32" rx="8" fill="rgba(121,230,255,0.12)" stroke="rgba(121,230,255,0.25)"/>
  <text x="80" y="179" font-family="system-ui,sans-serif" font-size="13" fill="#79e6ff">Dashboard</text>
  <text x="80" y="212" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa">React Starter</text>
  <text x="80" y="236" font-family="system-ui,sans-serif" font-size="13" fill="#71717a">API Sandbox</text>

  <!-- Main column -->
  <rect x="260" y="40" width="700" height="640" fill="#0c0c0e"/>
  <text x="300" y="88" font-family="system-ui,sans-serif" font-size="14" fill="#a1a1aa">Fix auth middleware tests</text>
  <rect x="300" y="110" width="620" height="120" rx="14" fill="#141416" stroke="rgba(255,255,255,0.06)"/>
  <text x="324" y="142" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Agent · step 2</text>
  <text x="324" y="168" font-family="ui-monospace,monospace" font-size="12" fill="#a1a1aa">grep -r "session" orchestrator/</text>
  <rect x="324" y="182" width="280" height="8" rx="4" fill="rgba(121,230,255,0.35)"/>
  <rect x="300" y="250" width="620" height="140" rx="14" fill="#141416" stroke="rgba(255,255,255,0.06)"/>
  <text x="324" y="282" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">edit_file</text>
  <rect x="324" y="296" width="572" height="12" rx="3" fill="rgba(34,197,94,0.25)"/>
  <rect x="324" y="316" width="480" height="12" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="300" y="520" width="620" height="120" rx="16" fill="#141416" stroke="rgba(255,255,255,0.08)"/>
  <text x="324" y="556" font-family="system-ui,sans-serif" font-size="13" fill="#71717a">Ask the agent&</text>
  <rect x="820" y="600" width="80" height="28" rx="14" fill="#f4f4f5"/>
  <text x="860" y="619" font-family="system-ui,sans-serif" font-size="12" fill="#09090b" text-anchor="middle">Send</text>

  <!-- Terminal rail -->
  <rect x="960" y="40" width="280" height="640" fill="#09090b"/>
  <rect x="960" y="40" width="1" height="640" fill="rgba(255,255,255,0.06)"/>
  <text x="984" y="76" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Terminal</text>
  <rect x="984" y="92" width="232" height="24" rx="6" fill="rgba(121,230,255,0.15)"/>
  <text x="996" y="108" font-family="ui-monospace,monospace" font-size="11" fill="#79e6ff">zsh · session 1</text>
  <rect x="984" y="130" width="232" height="480" rx="10" fill="#050608" stroke="rgba(255,255,255,0.05)"/>
  <text x="1000" y="162" font-family="ui-monospace,monospace" font-size="11" fill="#4ade80">$ pnpm test</text>
  <text x="1000" y="182" font-family="ui-monospace,monospace" font-size="11" fill="#a1a1aa">PASS tests/auth.test.ts</text>
  <text x="1000" y="210" font-family="ui-monospace,monospace" font-size="11" fill="#71717a">$ _</text>
</svg>
